name: Parallel Jobs Pipeline

on:
  push:
    branches:
      - main

jobs:
  job-1:
    runs-on: ubuntu-latest

    steps:
      - name: Run Job 1
        run: |
          echo "This is Job 1"
          sleep 5
          echo "Job 1 completed"

  job-2:
    runs-on: ubuntu-latest

    steps:
      - name: Run Job 2
        run: |
          echo "This is Job 2"
          sleep 5
          echo "Job 2 completed"

  job-3:
    runs-on: ubuntu-latest

    steps:
      - name: Run Job 3
        run: |
          echo "This is Job 3"
          sleep 5
          echo "Job 3 completed"
