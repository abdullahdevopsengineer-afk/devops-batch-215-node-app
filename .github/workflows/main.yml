name: Artifact Dependency Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Create Files
        run: |
          mkdir output

          echo "Hello from file 1" > output/file1.txt
          echo "Hello from file 2" > output/file2.txt

          ls -la output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: output/

  use-artifact:
    runs-on: ubuntu-latest
    needs: create-file

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: my-artifact
          path: downloaded-files/

      - name: Read Downloaded Files
        run: |
          echo "Listing downloaded files"

          ls -la downloaded-files

          echo "Reading file1.txt"
          cat downloaded-files/file1.txt

          echo "Reading file2.txt"
          cat downloaded-files/file2.txt
